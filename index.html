<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Glowing Heart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // ক্যানভাসের সাইজ সেট করার ফাংশন
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let particles = [];
        let t = 0; 

        function getHeartPosition(t) {
            // স্ক্রিনের সাইজ অনুযায়ী স্কেল নির্ধারণ করা হলো যেন হার্ট স্ক্রিনের বাইরে না যায়
            const scale = Math.min(canvas.width, canvas.height) / 35;
            
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            return { 
                x: x * scale + canvas.width / 2, 
                y: y * scale + canvas.height / 2 
            };
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2.5 + 1;
                this.alpha = 1; 
                this.hue = hue;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02; // কণাগুলো একটু দ্রুত মিলিয়ে যাবে, এতে মেমরি কম খরচ হবে
                this.size *= 0.95; 
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                
                // স্পিড ঠিক রাখার জন্য shadowBlur অফ করা হয়েছে।
                // Lighter ব্লেন্ড মোড এমনিতেই গ্লো ইফেক্ট দেবে।
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'lighter';

            // ল্যাগ কমানোর জন্য লুপ ৫ এর জায়গায় ৩ করা হয়েছে
            for (let i = 0; i < 3; i++) {
                const pos = getHeartPosition(t);
                const hue = (t * 50) % 360; 
                particles.push(new Particle(pos.x, pos.y, hue));
                t += 0.015; // হার্টটি আঁকার স্পিড একটু ব্যালান্স করা হলো
            }

            // উল্টো দিক থেকে লুপ চালালে array থেকে কণা মুছতে (splice) সমস্যা হয় না
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                
                if (p.alpha <= 0 || p.size <= 0.1) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
