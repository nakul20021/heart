<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Glowing Heart</title>
    <style>
        /* === CSS এর অংশ === */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* পুরো ব্যাকগ্রাউন্ড কালো */
            overflow: hidden; /* স্ক্রলবার লুকানোর জন্য */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // ক্যানভাসের সাইজ স্ক্রিনের সাইজ অনুযায়ী সেট করা
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let t = 0; // হার্ট আঁকার জন্য সময় বা এঙ্গেল

        // হার্টের গাণিতিক সমীকরণ (Math Formula for Heart Shape)
        function getHeartPosition(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            // ক্যানভাসের মাঝখানে আনার জন্য পজিশন গুণ ও যোগ করা হয়েছে
            return { 
                x: x * 15 + canvas.width / 2, 
                y: y * 15 + canvas.height / 2 
            };
        }

        // পার্টিকেল বা কণা তৈরির ক্লাস
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                // কণাগুলো চারদিকে ছড়িয়ে পড়ার স্পিড
                this.vx = (Math.random() - 0.5) * 2.5;
                this.vy = (Math.random() - 0.5) * 2.5;
                this.size = Math.random() * 3 + 1; // কণার সাইজ
                this.alpha = 1; // কণার দৃশ্যমানতা (Opacity)
                this.hue = hue;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.015; // ধীরে ধীরে অদৃশ্য হবে
                this.size *= 0.96; // ধীরে ধীরে ছোট হবে
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.shadowBlur = 15; // গ্লোয়িং ইফেক্ট
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // মূল অ্যানিমেশন লুপ
        function animate() {
            // পেছনের কণাগুলোর ট্রেইল (Trail) বা ছায়া ধরে রাখার জন্য
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // পার্টিকেল ব্লেন্ড করার জন্য
            ctx.globalCompositeOperation = 'lighter';

            // নতুন কণা তৈরি করা
            for (let i = 0; i < 5; i++) {
                const pos = getHeartPosition(t);
                // t এর মানের ওপর ভিত্তি করে রং (hue) বদলাবে
                const hue = (t * 50) % 360; 
                particles.push(new Particle(pos.x, pos.y, hue));
                t += 0.01; // হার্টটি কত দ্রুত আঁকা হবে তার স্পিড
            }

            // প্রতিটি কণা আপডেট এবং ড্র করা
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                // কণা ছোট বা অদৃশ্য হয়ে গেলে মুছে ফেলা
                if (p.alpha <= 0 || p.size <= 0.1) {
                    particles.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        // অ্যানিমেশন শুরু করা
        animate();

        // স্ক্রিন রিসাইজ করলে ক্যানভাস যেন ঠিক থাকে
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
